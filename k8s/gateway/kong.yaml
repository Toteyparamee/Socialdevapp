apiVersion: apps/v1
kind: Deployment
metadata:
  name: kong
  namespace: kong
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kong
  template:
    metadata:
      labels:
        app: kong
    spec:
      containers:
        - name: kong
          image: kong:3.9
          ports:
            - containerPort: 8000
              name: proxy
            - containerPort: 8001
              name: admin
          env:
            - name: KONG_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: kong-config
                  key: KONG_DATABASE
            - name: KONG_PROXY_LISTEN
              valueFrom:
                configMapKeyRef:
                  name: kong-config
                  key: KONG_PROXY_LISTEN
            - name: KONG_ADMIN_LISTEN
              valueFrom:
                configMapKeyRef:
                  name: kong-config
                  key: KONG_ADMIN_LISTEN
            - name: KONG_DECLARATIVE_CONFIG
              valueFrom:
                configMapKeyRef:
                  name: kong-config
                  key: KONG_DECLARATIVE_CONFIG
          volumeMounts:
            - name: kong-declarative
              mountPath: /etc/kong
          readinessProbe:
            httpGet:
              path: /status
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: kong-declarative
          configMap:
            name: kong-declarative
---
apiVersion: v1
kind: Service
metadata:
  name: kong-proxy
  namespace: kong
spec:
  type: NodePort
  selector:
    app: kong
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30000
      name: proxy
    - port: 8001
      targetPort: 8001
      nodePort: 30001
      name: admin
