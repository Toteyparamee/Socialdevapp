apiVersion: v1
kind: ConfigMap
metadata:
  name: kong-config
  namespace: kong
data:
  KONG_DATABASE: "off"
  KONG_PROXY_LISTEN: "0.0.0.0:8000"
  KONG_ADMIN_LISTEN: "0.0.0.0:8001"
  KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kong-declarative
  namespace: kong
data:
  kong.yml: |
    _format_version: "3.0"

    services:
      - name: auth-service
        url: http://auth.socialdev.svc.cluster.local:8080
        routes:
          - name: auth-route
            paths:
              - /auth
              - /users
            strip_path: false

      - name: image-service
        url: http://image.socialdev.svc.cluster.local:8081
        routes:
          - name: image-route
            paths:
              - /api/images
              - /images
            strip_path: false

      - name: problem-service
        url: http://problem.socialdev.svc.cluster.local:8083
        routes:
          - name: problem-route
            paths:
              - /api/problems
            strip_path: false

      - name: activity-service
        url: http://activity.socialdev.svc.cluster.local:8084
        routes:
          - name: activity-route
            paths:
              - /api/activities
            strip_path: false

      - name: chat-service
        url: http://chat.socialdev.svc.cluster.local:8085
        routes:
          - name: chat-route
            paths:
              - /api/chat
            strip_path: false

      - name: notification-service
        url: http://notification.socialdev.svc.cluster.local:8086
        routes:
          - name: notification-route
            paths:
              - /api/notifications
            strip_path: false

      - name: analytics-service
        url: http://analytics.socialdev.svc.cluster.local:8087
        routes:
          - name: analytics-route
            paths:
              - /api/analytics
            strip_path: false
